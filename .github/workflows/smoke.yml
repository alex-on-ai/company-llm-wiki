name: Smoke

on:
  push:
  pull_request:

jobs:
  unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Bash smoke tests
        run: bash tests/smoke.sh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run PowerShell and npx smoke tests
        shell: pwsh
        run: ./tests/smoke.ps1 -NpxIntegration
